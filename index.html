<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suduu ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Fullscreen image */
#bg {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Dark overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.3);
}

/* Center text */
#text {
    position: absolute;
    width: 100%;
    top: 50%;
    transform: translateY(-50%);
    text-align: center;
    font-size: 28px;
    color: white;
    font-weight: bold;
    text-shadow: 0 0 10px black;
}

/* Hearts */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    from {
        transform: translateY(100vh);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body onclick="startLove()">

<img id="bg" src="love.png">

<div class="overlay"></div>

<div id="text">Tap ❤️</div>

<!-- Romantic Music -->
<audio id="music" loop>
    <source src="mysong.mp3" type="audio/mpeg">
</audio>

<script>
let started = false;

function startLove() {
    if (started) return;
    started = true;

    // Start music
    document.getElementById("music").play();

    // Vibration
    if (navigator.vibrate) navigator.vibrate(200);

    // Text loop
    const text = document.getElementById("text");
    text.textContent = "";

    let msg = "Aadareii suduu Aadareii ❤️ ";
    let i = 0;

    setInterval(() => {
        text.textContent += msg[i];
        i++;

        if (i >= msg.length) {
            text.textContent = "";
            i = 0;
        }
    }, 120);

    // Floating hearts
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (15 + Math.random() * 25) + "px";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 300);
}
</script>

</body>
</html>
